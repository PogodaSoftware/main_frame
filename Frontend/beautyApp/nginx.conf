server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html/browser;
    index  index.html;
    absolute_redirect off;

    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $backend_host backend;
        proxy_pass http://$backend_host:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle /pogoda/beauty/* requests arriving directly on BEAUTY_PORT.
    # When the browser follows <base href="/pogoda/beauty/">, all asset URLs
    # are prefixed with /pogoda/beauty/ (e.g. /pogoda/beauty/main-1234.js).
    # The alias directive maps that prefix to the build output root so that
    # /pogoda/beauty/main-1234.js resolves to /usr/share/nginx/html/browser/main-1234.js.
    # The /index.html fallback uses the server root, not the alias, so SPA
    # deep-links also fall back to the correct file.
    location /pogoda/beauty/ {
        alias /usr/share/nginx/html/browser/;
        try_files $uri $uri/ /index.html;
    }

    # Handle requests arriving with the prefix already stripped (e.g. forwarded
    # by the portfolio nginx rewrite: rewrite ^/pogoda/beauty/?(.*)$ /$1 break).
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
