server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html/browser;
    index  index.html index.html;
    absolute_redirect off;

    location /kevin/ {
        alias /usr/share/nginx/html/browser/;
        try_files $uri $uri/ /kevin/index.html;
    }

    # Serve attached_assets with correct MIME types for 3D models
    location /kevin/assets/attached_assets/ {
        alias /usr/share/nginx/html/browser/assets/attached_assets/;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Set correct MIME types for 3D model files (top-level to avoid alias inheritance issues)
    location ~* \.glb$ {
        add_header Content-Type "model/gltf-binary";
        add_header Cache-Control "public, max-age=31536000";
    }
    location ~* \.gltf$ {
        add_header Content-Type "model/gltf+json";
        add_header Cache-Control "public, max-age=31536000";
    }

    location /kevin {
        return 301 /kevin/;
    }

    # Proxy all /pogoda/beauty/* requests to the dedicated beauty frontend container.
    # The rewrite strips the /pogoda/beauty prefix before forwarding so that beauty
    # nginx receives simple paths like /login or /main-*.js matching its file tree.
    location /pogoda/beauty {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $beauty_host beauty_frontend;
        rewrite ^/pogoda/beauty/?(.*)$ /$1 break;
        proxy_pass http://$beauty_host:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
    }

    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $backend_host backend;
        proxy_pass http://$backend_host:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html/browser;
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
