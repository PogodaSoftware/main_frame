server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html/browser;
    index  index.html index.html;

    # -------------------------------------------------
    # Proxy API requests to the backend service
    # -------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------
    # Serve the Angular SPA under /pogoda/beauty path
    # -------------------------------------------------
    location /pogoda/beauty/ {
        try_files $uri $uri/ /pogoda/beauty/index.html;
    }

    location /pogoda/beauty {
        return 301 /pogoda/beauty/;
    }

    # Serve static assets for the beauty app
    location /pogoda/beauty/assets/ {
        alias /usr/share/nginx/html/browser/assets/;
    }

    # Fallback for any other requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}