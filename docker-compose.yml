# Updated 2025-11-12: Major dependency cleanup and security update
# - Angular: 19.0.0 → 19.2.15 (fixed SSR vulnerability)
# - Django: 5.1.5 (already up-to-date)
# - Removed unused dependencies: @angular/forms, @angular/animations, behave
# - Package reduction: 1,157 → 849 packages (-27%)
# - Security: 0 vulnerabilities remaining

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${PGDATABASE:-pogoda_db}
      - POSTGRES_USER=${PGUSER:-pogoda_user}
      - POSTGRES_PASSWORD=${PGPASSWORD:-pogoda_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-pogoda_user} -d ${PGDATABASE:-pogoda_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend/controller
      dockerfile: Dockerfile
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    environment:
      - PYTHONUNBUFFERED=1
      - PGHOST=${PGHOST:-db}
      - PGPORT=${PGPORT:-5432}
      - PGDATABASE=${PGDATABASE:-pogoda_db}
      - PGUSER=${PGUSER:-pogoda_user}
      - PGPASSWORD=${PGPASSWORD:-pogoda_pass}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:${BACKEND_PORT:-8000}"
    depends_on:
      db:
        condition: service_healthy

  beauty_frontend:
    build:
      context: ./Frontend/beautyApp
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    develop:
      watch:
        - path: ./Frontend/beautyApp/src
          action: rebuild
          ignore:
            - node_modules/
            - dist/
        - path: ./Frontend/beautyApp/package.json
          action: rebuild
        - path: ./Frontend/beautyApp/nginx.conf
          action: rebuild

  frontend:
    build:
      context: ./Frontend/portfolioResume
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      backend:
        condition: service_started
      beauty_frontend:
        condition: service_started
    develop:
      watch:
        - path: ./Frontend/portfolioResume/src
          action: rebuild
          ignore:
            - node_modules/
            - dist/
        - path: ./Frontend/portfolioResume/package.json
          action: rebuild
        - path: ./Frontend/portfolioResume/nginx.conf
          action: rebuild

volumes:
  postgres_data:
